<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="assets/css/index.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <title>Sign In - Car Rental</title>
    <style>
      .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 100px);
        padding: 2rem;
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .auth-container {
        background: #fff;
        padding: 2.5rem;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 450px;
        box-sizing: border-box;
      }
      .auth-container h2 {
        text-align: center;
        margin-bottom: 1.5rem;
        color: #1a202c;
        font-size: 1.5rem;
        font-weight: 700;
      }
      .form-group {
        margin-bottom: 1.2rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #1a202c;
        font-size: 0.9rem;
      }
      .form-group input {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #e2e8f0;
        border-radius: 5px;
        outline: none;
        font-family: inherit;
        font-size: 0.9rem;
        box-sizing: border-box;
      }
      .form-group input:focus {
        border-color: #3563e9;
      }
      .auth-btn {
        width: 100%;
        padding: 0.8rem;
        background: #3563e9;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 600;
        margin-top: 1rem;
        transition: background 0.3s ease;
      }
      .auth-btn:hover {
        background: #274bc9;
      }
      .auth-link {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: #90a3bf;
      }
      .auth-link a {
        color: #3563e9;
        text-decoration: none;
        font-weight: 600;
      }
      .auth-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body class="main-page">
    <header>
      <nav class="navigation">
        <div class="logo-search-wrapper">
          <a href="index.html">Morent</a>
        </div>
        <div class="cta-wrapper">
          <div class="cta-auth-btns">
            <a href="sign-up.html">Sign up</a>
            <a href="sign-in.html">Sign in</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="auth-wrapper">
      <div class="auth-container">
        <h2>Sign In</h2>
        <form action="">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email address"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="form__input-wrapper">
              <input
                class="form__input-password"
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <button class="form__toggle-password" data-target="loginPassword">
                <span class="form__toggle-icon">Show</span>
              </button>
            </div>
          </div>
          <button type="submit" class="auth-btn">Sign In</button>
        </form>
        <div class="auth-link">
          Don't have an account? <a href="sign-up.html">Sign up</a>
        </div>
      </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
